# Local development environment — PostgreSQL + Redis + Django API + Celery worker

services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:15-alpine
    container_name: dl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dl_user
      POSTGRES_PASSWORD: dl_pass
      POSTGRES_DB: digital_legacy_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dl_user -d digital_legacy_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: dl_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_dev_pass
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'redis_dev_pass', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Django API ----
  api:
    build:
      context: .
      target: development
    container_name: dl_api
    restart: unless-stopped
    ports:
      - '8000:8000'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://dl_user:dl_pass@postgres:5432/digital_legacy_dev
      REDIS_URL: redis://:redis_dev_pass@redis:6379/0
    volumes:
      - .:/app          # Hot reload in development
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # ---- Celery Worker (DMS background tasks) ----
  celery:
    build:
      context: .
      target: development
    container_name: dl_celery
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://dl_user:dl_pass@postgres:5432/digital_legacy_dev
      REDIS_URL: redis://:redis_dev_pass@redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - api
      - redis
    command: celery -A config.celery worker --loglevel=info

  # ---- Celery Beat (Cron scheduler for DMS checks) ----
  celery-beat:
    build:
      context: .
      target: development
    container_name: dl_celery_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://dl_user:dl_pass@postgres:5432/digital_legacy_dev
      REDIS_URL: redis://:redis_dev_pass@redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - api
      - redis
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ---- Frontend (React + Vite) ----
  frontend:
    build:
      context: ./frontend
      target: development
    container_name: dl_frontend
    restart: unless-stopped
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
