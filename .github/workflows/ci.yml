# .github/workflows/ci.yml
# Digital Legacy App — Django CI Pipeline
# Runs on every push to main/develop and all pull requests.
# Gates: lint → SAST → unit tests → integration tests → security audit → build check

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.12'
  DJANGO_SETTINGS_MODULE: config.settings
  SECRET_KEY: 'ci-test-secret-key-not-for-production-use-only'
  DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/digital_legacy_test'
  REDIS_URL: 'redis://localhost:6379/0'
  DEBUG: 'True'
  ALLOWED_HOSTS: 'localhost,127.0.0.1'
  ENCRYPTION_KEY: 'a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2'

jobs:
  # ---- Job 1: Lint & Format ----
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linting tools
        run: pip install black isort flake8 mypy django-stubs djangorestframework-stubs

      - name: Check Black formatting
        run: black --check apps/ core/ config/

      - name: Check import ordering (isort)
        run: isort --check-only apps/ core/ config/

      - name: Run flake8
        run: flake8 apps/ core/ config/ --max-line-length=100 --exclude=migrations

  # ---- Job 2: SAST Security Scan ----
  sast:
    name: Static Security Analysis (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST scan
        run: |
          bandit -r apps/ core/ \
            --exclude apps/*/migrations \
            --severity-level medium \
            --confidence-level medium \
            -f json -o bandit-report.json || true
          bandit -r apps/ core/ \
            --exclude apps/*/migrations \
            --severity-level high \
            --confidence-level high
          # Fail on HIGH severity findings

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

  # ---- Job 3: Unit Tests ----
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests (no DB required)
        run: pytest tests/unit/ -m "unit or not integration" -v --no-cov
        env:
          SECRET_KEY: ${{ env.SECRET_KEY }}
          DEBUG: ${{ env.DEBUG }}

  # ---- Job 4: Integration Tests (with PostgreSQL + Redis) ----
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: digital_legacy_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django migrations
        run: python manage.py migrate --no-input

      - name: Run all tests with coverage
        run: pytest --cov=apps --cov=core --cov-report=xml --cov-fail-under=80 -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml

  # ---- Job 5: Dependency Vulnerability Scan ----
  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Safety
        run: pip install safety

      - name: Scan dependencies for CVEs
        run: safety check -r requirements.txt --full-report

  # ---- Job 6: Check Migrations are Valid ----
  check-migrations:
    name: Check Migrations
    runs-on: ubuntu-latest
    needs: [unit-tests]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: digital_legacy_test
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Verify all migrations apply cleanly
        run: python manage.py migrate --no-input
